name: 'Setup SGLang Backend'
description: 'Create Python venv, restore/save SGLang uv cache, and install SGLang.'

runs:
  using: 'composite'
  steps:
    - name: Setup Python venv
      shell: bash
      run: bash scripts/ci_setup_python_venv.sh

    - name: Restore SGLang uv cache
      id: sglang-cache
      uses: actions/cache/restore@v4
      with:
        path: ~/.local/share/uv/cache
        key: sglang-uv-${{ runner.os }}-${{ hashFiles('scripts/ci_install_sglang.sh') }}

    - name: Install SGLang
      shell: bash
      run: bash scripts/ci_install_sglang.sh

    - name: Save SGLang uv cache
      if: steps.sglang-cache.outputs.cache-hit != 'true'
      uses: actions/cache/save@v4
      with:
        path: ~/.local/share/uv/cache
        key: sglang-uv-${{ runner.os }}-${{ hashFiles('scripts/ci_install_sglang.sh') }}
