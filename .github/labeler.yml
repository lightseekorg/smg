# Label configuration for actions/labeler
# See: https://github.com/actions/labeler

python-bindings:
  - changed-files:
      - any-glob-to-any-file: 'bindings/python/**/*'

documentation:
  - changed-files:
      - any-glob-to-any-file:
          - '**/*.md'
          - 'docs/**/*'
          - 'mkdocs.yml'

dependencies:
  - changed-files:
      - any-glob-to-any-file:
          - '**/Cargo.toml'
          - '**/Cargo.lock'
          - '**/pyproject.toml'

ci:
  - changed-files:
      - any-glob-to-any-file: '.github/**/*'

docker:
  - changed-files:
      - any-glob-to-any-file:
          - 'docker/**/*'
          - '**/Dockerfile'

grpc:
  - changed-files:
      - any-glob-to-any-file:
          - 'core/grpc_client/**/*'
          - 'model_gateway/src/routers/grpc/**/*'

mcp:
  - changed-files:
      - any-glob-to-any-file: 'core/mcp/**/*'

tokenizer:
  - changed-files:
      - any-glob-to-any-file: 'core/tokenizer/**/*'

tool-parser:
  - changed-files:
      - any-glob-to-any-file: 'core/tool_parser/**/*'

reasoning-parser:
  - changed-files:
      - any-glob-to-any-file: 'core/reasoning_parser/**/*'

wasm:
  - changed-files:
      - any-glob-to-any-file:
          - 'infra/wasm/**/*'
          - 'model_gateway/src/wasm/**/*'

auth:
  - changed-files:
      - any-glob-to-any-file: 'infra/auth/**/*'

data-connector:
  - changed-files:
      - any-glob-to-any-file: 'infra/data_connector/**/*'

multimodal:
  - changed-files:
      - any-glob-to-any-file: 'core/multimodal/**/*'

protocols:
  - changed-files:
      - any-glob-to-any-file: 'core/protocols/**/*'

workflow:
  - changed-files:
      - any-glob-to-any-file: 'infra/workflow/**/*'

model-gateway:
  - changed-files:
      - any-glob-to-any-file: 'model_gateway/**/*'

openai:
  - changed-files:
      - any-glob-to-any-file: 'model_gateway/src/routers/openai/**/*'

anthropic:
  - changed-files:
      - any-glob-to-any-file: 'model_gateway/src/routers/anthropic/**/*'

gemini:
  - changed-files:
      - any-glob-to-any-file: 'model_gateway/src/routers/gemini/**/*'

realtime-api:
  - changed-files:
      - any-glob-to-any-file:
          - 'core/protocols/src/realtime_*'
          - 'core/protocols/src/builders/realtime/**/*'
          - 'model_gateway/src/routers/openai/realtime/**/*'

benchmarks:
  - changed-files:
      - any-glob-to-any-file: 'model_gateway/benches/**/*'

tests:
  - changed-files:
      - any-glob-to-any-file:
          - 'e2e_test/**/*'
          - '**/tests/**/*'
