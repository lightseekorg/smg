# Integration tests for fork PRs (requires secrets)
#
# Fork PRs cannot access repo secrets via the `pull_request` trigger.
# This workflow uses `pull_request_target` to run in the base repo context,
# giving access to secrets after a maintainer adds the `safe-to-test` label.
#
# Security model:
#   1. Contributor opens fork PR
#   2. Non-secret CI runs automatically (pr-test-rust.yml)
#   3. Maintainer reviews the fork's code
#   4. Maintainer adds `safe-to-test` label
#   5. This workflow triggers, checks out the PR code, runs with secrets
#
# IMPORTANT: Only label a PR after reviewing its code. This workflow
# executes the fork's code with access to repo secrets.

name: "Fork PR: Integration Tests"

on:
  pull_request_target:
    branches: [main]
    types: [labeled]

permissions:
  contents: read

concurrency:
  group: fork-integration-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  RUSTC_WRAPPER: sccache
  SCCACHE_GHA_ENABLED: "true"
  GENAI_BENCH_IMAGE: ghcr.io/moirai-internal/genai-bench:0.0.3
  PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}

jobs:
  # Gate: only run for fork PRs with the safe-to-test label
  guard:
    if: >-
      github.event.label.name == 'safe-to-test'
      && github.event.pull_request.head.repo.full_name != github.repository
    runs-on: ubuntu-latest
    steps:
      - run: echo "Fork PR #${{ github.event.pull_request.number }} approved for integration testing"

  build-wheel:
    needs: guard
    runs-on: k8s-runner-gpu
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ env.PR_HEAD_SHA }}

      - name: Setup Rust
        uses: ./.github/actions/setup-rust

      - name: Build Python wheel and Go FFI library
        run: |
          rm -rf bindings/python/dist/
          bash scripts/ci_setup_python_venv.sh
          bash scripts/ci_build_wheel.sh

      - name: Generate Python client types
        run: |
          source "$HOME/.cargo/env"
          mkdir -p clients/openapi
          cargo run -p openapi-gen -- clients/openapi/smg-openapi.yaml
          pip install 'datamodel-code-generator==0.54.0'
          datamodel-codegen \
            --input clients/openapi/smg-openapi.yaml \
            --input-file-type openapi \
            --output clients/python/smg_client/types/_generated.py \
            --output-model-type pydantic_v2.BaseModel \
            --use-annotated \
            --field-constraints \
            --target-python-version 3.10 \
            --collapse-root-models \
            --use-standard-collections \
            --use-union-operator
          sed -i 's/class \(.*\)(Enum):/class \1(str, Enum):/' clients/python/smg_client/types/_generated.py

      - name: Build WASM test fixtures
        run: |
          source "$HOME/.cargo/env"
          bash crates/wasm/tests/fixtures/build_fixtures.sh

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v7
        with:
          name: smg-wheel
          path: bindings/python/dist/*.whl
          retention-days: 1

      - name: Upload Go FFI library artifact
        uses: actions/upload-artifact@v7
        with:
          name: go-ffi-library
          path: bindings/golang/target/release/libsmg_go.*
          retention-days: 1

      - name: Upload Python client types
        uses: actions/upload-artifact@v7
        with:
          name: python-client-types
          path: clients/python/smg_client/types/_generated.py
          retention-days: 1

      - name: Upload WASM test fixtures
        uses: actions/upload-artifact@v7
        with:
          name: wasm-test-fixtures
          path: crates/wasm/tests/fixtures/*.wasm
          retention-days: 1
          if-no-files-found: ignore

      - name: Show sccache stats
        if: always()
        run: sccache --show-stats

  # --- GPU E2E tests ---

  e2e-1gpu-chat:
    name: e2e-1gpu-chat (${{ matrix.engine }})
    needs: build-wheel
    strategy:
      fail-fast: false
      matrix:
        include:
          - engine: sglang
            timeout: 30
            runner: 1-gpu
            test_filter: ""
          - engine: vllm
            timeout: 20
            runner: 1-gpu
            test_filter: "-k 'not (5-grpc or 2-None-grpc or multiple_choices)'"
          - engine: trtllm
            timeout: 90
            runner: 1-gpu-h100
            test_filter: ""
    uses: ./.github/workflows/e2e-gpu-job.yml
    with:
      engine: ${{ matrix.engine }}
      gpu_tier: "1"
      runner: ${{ matrix.runner }}
      timeout: ${{ matrix.timeout }}
      test_dirs: e2e_test/chat_completions
      test_filter: ${{ matrix.test_filter }}
      checkout_ref: ${{ github.event.pull_request.head.sha }}
    secrets: inherit

  e2e-1gpu-embeddings:
    needs: build-wheel
    uses: ./.github/workflows/e2e-gpu-job.yml
    with:
      engine: sglang
      gpu_tier: "1"
      runner: 1-gpu
      timeout: 20
      test_dirs: e2e_test/embeddings
      extra_deps: "sentence-transformers"
      checkout_ref: ${{ github.event.pull_request.head.sha }}
    secrets: inherit

  e2e-1gpu-gateway:
    name: e2e-1gpu-gateway (${{ matrix.engine }})
    needs: build-wheel
    strategy:
      fail-fast: false
      matrix:
        include:
          - engine: sglang
            timeout: 20
          - engine: vllm
            timeout: 20
    uses: ./.github/workflows/e2e-gpu-job.yml
    with:
      engine: ${{ matrix.engine }}
      gpu_tier: "1"
      runner: 1-gpu
      timeout: ${{ matrix.timeout }}
      test_dirs: e2e_test/router
      test_filter: "--ignore=e2e_test/router/test_pd_mmlu.py"
      checkout_ref: ${{ github.event.pull_request.head.sha }}
    secrets: inherit

  e2e-2gpu-chat:
    needs: e2e-1gpu-chat
    uses: ./.github/workflows/e2e-gpu-job.yml
    with:
      engine: sglang
      gpu_tier: "2"
      runner: 2-gpu-h100
      timeout: 20
      test_dirs: e2e_test/chat_completions
      checkout_ref: ${{ github.event.pull_request.head.sha }}
    secrets: inherit

  e2e-2gpu-responses:
    needs: build-wheel
    uses: ./.github/workflows/e2e-gpu-job.yml
    with:
      engine: sglang
      gpu_tier: "2"
      runner: 2-gpu-h100
      timeout: 30
      test_dirs: e2e_test/responses
      setup_agentic_deps: true
      checkout_ref: ${{ github.event.pull_request.head.sha }}
    secrets: inherit

  e2e-2gpu-pd:
    name: e2e-2gpu-pd (${{ matrix.engine }})
    needs: e2e-1gpu-gateway
    strategy:
      fail-fast: false
      matrix:
        include:
          - engine: sglang
            timeout: 30
          - engine: vllm
            timeout: 30
    uses: ./.github/workflows/e2e-gpu-job.yml
    with:
      engine: ${{ matrix.engine }}
      gpu_tier: "2"
      runner: 2-gpu-h100
      timeout: ${{ matrix.timeout }}
      test_dirs: e2e_test/router
      checkout_ref: ${{ github.event.pull_request.head.sha }}
    secrets: inherit

  e2e-4gpu-chat:
    needs: e2e-2gpu-chat
    uses: ./.github/workflows/e2e-gpu-job.yml
    with:
      engine: sglang
      gpu_tier: "4"
      runner: 4-gpu-h100
      timeout: 20
      test_dirs: e2e_test/chat_completions
      checkout_ref: ${{ github.event.pull_request.head.sha }}
    secrets: inherit

  # --- Vendor E2E (CPU, cloud backends) ---

  e2e-vendor:
    name: ${{ matrix.name }}
    needs: build-wheel
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: anthropic-messages
            vendor: anthropic
            test_path: e2e_test/messages
            timeout: 20
            setup_agentic_deps: true

          - name: openai-responses
            vendor: openai
            test_path: e2e_test/responses
            timeout: 30
            setup_agentic_deps: true

          - name: openai-realtime
            vendor: openai
            test_path: e2e_test/realtime
            timeout: 20

          - name: xai-responses
            vendor: xai
            test_path: e2e_test/responses
            timeout: 15
            setup_agentic_deps: true

    runs-on: k8s-runner-cpu
    timeout-minutes: ${{ matrix.timeout }}
    env:
      E2E_VENDOR: ${{ matrix.vendor }}
      E2E_GPU_TIER: "0"
      SHOW_ROUTER_LOGS: "1"
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ env.PR_HEAD_SHA }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Check shared services
        if: matrix.setup_agentic_deps
        run: bash scripts/ci_agentic_svc_deps.sh check --oracle oracle-db --brave brave-search-mcp

      - name: Download wheel artifact
        uses: actions/download-artifact@v8
        with:
          name: smg-wheel
          path: wheel/

      - name: Download WASM test fixtures
        uses: actions/download-artifact@v8
        with:
          name: wasm-test-fixtures
          path: crates/wasm/tests/fixtures/
        continue-on-error: true

      - name: Download Python client types
        uses: actions/download-artifact@v8
        with:
          name: python-client-types
          path: clients/python/smg_client/types/

      - name: Install wheel and test dependencies
        run: |
          pip uninstall -y smg || true
          pip install wheel/*.whl
          bash scripts/ci_install_e2e_deps.sh

      - name: Setup Oracle
        if: matrix.setup_agentic_deps
        run: |
          bash scripts/ci_agentic_svc_deps.sh setup-oracle-client
          bash scripts/ci_agentic_svc_deps.sh create-oracle-user oracle-db
          bash scripts/ci_agentic_svc_deps.sh create-oracle-flyway-user oracle-db

      - name: Run E2E tests
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
          BRAVE_MCP_HOST: ${{ matrix.setup_agentic_deps && 'brave-search-mcp' || '' }}
        run: |
          ROUTER_LOCAL_MODEL_PATH="/home/ubuntu/models" pytest ${{ matrix.test_path }} \
            -m "not external" \
            --reruns 2 --reruns-delay 5 \
            -s -vv

      - name: Cleanup Oracle test users
        if: always() && matrix.setup_agentic_deps
        run: |
          bash scripts/ci_agentic_svc_deps.sh cleanup-oracle-flyway-user oracle-db
          bash scripts/ci_agentic_svc_deps.sh cleanup-oracle-user oracle-db

  # --- Benchmarks ---

  benchmarks:
    needs: build-wheel
    runs-on: 4-gpu-h100
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ env.PR_HEAD_SHA }}

      - name: Setup SGLang backend
        uses: ./.github/actions/setup-sglang

      - name: Download wheel artifact
        uses: actions/download-artifact@v8
        with:
          name: smg-wheel
          path: wheel/

      - name: Download WASM test fixtures
        uses: actions/download-artifact@v8
        with:
          name: wasm-test-fixtures
          path: crates/wasm/tests/fixtures/
        continue-on-error: true

      - name: Download Python client types
        uses: actions/download-artifact@v8
        with:
          name: python-client-types
          path: clients/python/smg_client/types/

      - name: Install wheel and test dependencies
        run: |
          pip uninstall -y smg || true
          pip install wheel/*.whl
          bash scripts/ci_install_e2e_deps.sh

      - name: Pull genai-bench image
        run: docker pull ${{ env.GENAI_BENCH_IMAGE }}

      - name: Run benchmarks
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          ROUTER_LOCAL_MODEL_PATH: /home/ubuntu/models
        run: |
          bash scripts/ci_killall_sglang.sh "nuk_gpus"
          SHOW_WORKER_LOGS=0 SHOW_ROUTER_LOGS=1 pytest e2e_test/benchmarks \
            --ignore=e2e_test/benchmarks/test_go_bindings_perf.py \
            --ignore=e2e_test/benchmarks/test_nightly_perf.py \
            -s -vv

  # --- Go bindings E2E ---

  go-bindings-e2e:
    needs: build-wheel
    runs-on: 1-gpu-h100
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ env.PR_HEAD_SHA }}

      - name: Setup SGLang backend
        uses: ./.github/actions/setup-sglang

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.24'
          cache: true
          cache-dependency-path: bindings/golang/go.sum

      - name: Download Go FFI library
        uses: actions/download-artifact@v8
        with:
          name: go-ffi-library
          path: bindings/golang/target/release/

      - name: Verify Go FFI library
        run: ls -la bindings/golang/target/release/libsmg_go.*

      - name: Download wheel artifact
        uses: actions/download-artifact@v8
        with:
          name: smg-wheel
          path: wheel/

      - name: Download Python client types
        uses: actions/download-artifact@v8
        with:
          name: python-client-types
          path: clients/python/smg_client/types/

      - name: Install wheel and test dependencies
        run: |
          pip uninstall -y smg || true
          pip install wheel/*.whl
          bash scripts/ci_install_e2e_deps.sh

      - name: Run Go OAI server E2E tests
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          bash scripts/ci_killall_sglang.sh "nuk_gpus"
          export CGO_LDFLAGS="-L$(pwd)/bindings/golang/target/release"
          export LD_LIBRARY_PATH="$(pwd)/bindings/golang/target/release:$LD_LIBRARY_PATH"
          SHOW_WORKER_LOGS=0 SHOW_ROUTER_LOGS=1 ROUTER_LOCAL_MODEL_PATH="/home/ubuntu/models" \
            pytest --reruns 2 --reruns-delay 5 e2e_test/bindings_go -s -vv
