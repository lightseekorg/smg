name: Benchmark - Radix Tree

on:
  push:
    branches: [ main ]
    paths:
      - 'model_gateway/benches/radix_tree_benchmark.rs'
      - 'kv_index/**'
      - '!kv_index/**/tests/**'
      - '!kv_index/**/*_test.rs'
      - '!kv_index/**/test_*.rs'
  pull_request:
    branches: [ main ]
    paths:
      - 'model_gateway/benches/radix_tree_benchmark.rs'
      - 'kv_index/**'
      - '!kv_index/**/tests/**'
      - '!kv_index/**/*_test.rs'
      - '!kv_index/**/test_*.rs'
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 0'

concurrency:
  group: benchmark-radix-tree-${{ github.ref }}
  cancel-in-progress: true

env:
  RUSTC_WRAPPER: sccache
  SCCACHE_GHA_ENABLED: "true"

permissions:
  contents: read

jobs:
  benchmark:
    name: Radix Tree (Cache-Aware Routing)
    if: github.repository == 'lightseekorg/smg'
    runs-on: k8s-runner-gpu
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 100

      - name: Setup Rust
        uses: ./.github/actions/setup-rust
        with:
          sccache-version: 'v0.10.0'

      - name: Run criterion benchmark
        timeout-minutes: 40
        run: |
          source "$HOME/.cargo/env"
          cargo bench --bench radix_tree_benchmark -- benchmark_summary 2>&1 | tee benchmark_output.txt

      - name: Run throughput benchmark
        timeout-minutes: 10
        run: |
          source "$HOME/.cargo/env"
          cargo bench -p kv-index --bench throughput_bench -- \
            --num-sessions 200000 \
            --num-workers 256 \
            --jump-size 8 \
            --sweep-min-ms 10 \
            --sweep-steps 20 2>&1 | tee throughput_output.txt

      - name: Upload benchmark results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: radix-tree-results-${{ github.sha }}
          path: |
            target/criterion/benchmark_summary/
            benchmark_output.txt
            throughput_output.txt
          retention-days: 30

      - name: Show sccache stats
        if: always()
        run: sccache --show-stats || true

      - name: Summary
        if: always()
        run: |
          echo "## Radix Tree Benchmark (Cache-Aware Routing)" >> $GITHUB_STEP_SUMMARY
          if [ -f benchmark_output.txt ]; then
            echo '```' >> $GITHUB_STEP_SUMMARY
            tail -50 benchmark_output.txt >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Throughput Benchmark (Block ops/sec)" >> $GITHUB_STEP_SUMMARY
          if [ -f throughput_output.txt ]; then
            echo '```' >> $GITHUB_STEP_SUMMARY
            tail -30 throughput_output.txt >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi
