name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths-ignore:
      - '*.md'
      - 'docs/**'
      - '*.lock'
      - 'mkdocs.yml'
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write

jobs:
  # Auto-review on PR open/push
  review:
    name: Claude PR Review
    if: >-
      github.event_name == 'pull_request'
      && github.repository == 'lightseekorg/smg'
      && github.actor != 'dependabot[bot]'
    runs-on: k8s-runner-cpu
    timeout-minutes: 30
    concurrency:
      group: claude-review-${{ github.event.pull_request.number }}
      cancel-in-progress: true
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Export API key from pod env
        run: |
          echo "::add-mask::${ANTHROPIC_API_KEY}"
          echo "ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}" >> "$GITHUB_ENV"

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ env.ANTHROPIC_API_KEY }}
          github_token: ${{ github.token }}
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            Review this PR in three phases:

            Phase 1 — SMG subsystem review:
            Use the /smg:review-pr skill. Follow its full process: fetch diff, map files
            to checklist sections, check each applicable section.

            Phase 2 — Silent failure hunting:
            Spawn a pr-review-toolkit:silent-failure-hunter agent on the changed files.
            Look for swallowed errors, inappropriate fallbacks, and missing error propagation.

            Phase 3 — Test coverage analysis:
            Spawn a pr-review-toolkit:pr-test-analyzer agent to check if tests adequately
            cover the new/changed functionality.

            If new types are introduced, also spawn a pr-review-toolkit:type-design-analyzer
            agent to review their invariants and encapsulation.

            Also read REVIEW.md at the repo root for additional domain-specific guidance.

            Summarize all findings with severity (blocker/nit) and file:line citations.
          claude_args: |
            --model claude-opus-4-6
            --max-turns 30
            --allowedTools "Read,Glob,Grep,Bash(git diff:*),Bash(git log:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr comment:*),Bash(cargo clippy:*),Bash(cargo check:*)"
          plugins: "pr-review-toolkit@claude-plugins-official"
          plugin_marketplaces: |
            https://github.com/anthropics/claude-plugins-official.git
            https://github.com/lightseekorg/smg-dev-guide.git

  # Respond to @claude mentions in PR/issue comments
  respond:
    name: Claude Respond
    if: >-
      (github.event_name == 'issue_comment' || github.event_name == 'pull_request_review_comment')
      && contains(github.event.comment.body, '@claude')
      && github.repository == 'lightseekorg/smg'
    runs-on: k8s-runner-cpu
    timeout-minutes: 30
    concurrency:
      group: claude-respond-${{ github.event.issue.number || github.event.pull_request.number }}
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Export API key from pod env
        run: |
          echo "::add-mask::${ANTHROPIC_API_KEY}"
          echo "ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}" >> "$GITHUB_ENV"

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ env.ANTHROPIC_API_KEY }}
          github_token: ${{ github.token }}
          claude_args: |
            --model claude-opus-4-6
            --max-turns 30
          plugins: "pr-review-toolkit@claude-plugins-official"
          plugin_marketplaces: |
            https://github.com/anthropics/claude-plugins-official.git
            https://github.com/lightseekorg/smg-dev-guide.git
