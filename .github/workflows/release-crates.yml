name: Publish Crates

permissions:
  contents: read

on:
  push:
    branches: [main]
    paths:
      - '**/Cargo.toml'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  # Tier 1: Crates with no internal dependencies
  tier1:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - crate: openai-protocol
            path: core/protocols
          - crate: reasoning-parser
            path: core/reasoning_parser
          - crate: kv-index
            path: core/kv_index
          - crate: data-connector
            path: infra/data_connector
          - crate: wfaas
            path: infra/workflow
          - crate: smg-wasm
            path: infra/wasm
          - crate: smg-auth
            path: infra/auth
          - crate: llm-tokenizer
            path: core/tokenizer
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/publish-crate
        with:
          crate: ${{ matrix.crate }}
          path: ${{ matrix.path }}
          token: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  # Tier 2: Crates depending on tier 1
  tier2:
    needs: tier1
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - crate: tool-parser
            path: core/tool_parser
          - crate: smg-mcp
            path: core/mcp
          - crate: smg-grpc-client
            path: core/grpc_client
          - crate: llm-multimodal
            path: core/multimodal
          - crate: smg-mesh
            path: infra/mesh
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/publish-crate
        with:
          crate: ${{ matrix.crate }}
          path: ${{ matrix.path }}
          token: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  # Tier 3: Main crate depending on all others
  tier3:
    needs: tier2
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/publish-crate
        with:
          crate: smg
          path: model_gateway
          token: ${{ secrets.CARGO_REGISTRY_TOKEN }}
