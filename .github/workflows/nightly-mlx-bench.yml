name: Nightly MLX Benchmark

on:
  schedule:
    # 09:17 UTC = ~02:17 PT — off-peak, off the round hour to dodge fleet load
    - cron: "17 9 * * *"
  workflow_dispatch:
    inputs:
      model:
        description: "Model id"
        required: false
        default: "mlx-community/gemma-3-4b-it-qat-4bit"
      concurrencies:
        description: "Space-separated concurrencies"
        required: false
        default: "1 4 16 64"
      scenarios:
        description: "Space-separated scenarios: chat (ShareGPT) and/or agent (vdaita/edit_10k_char)"
        required: false
        default: "chat agent"
  # TEMPORARY: enable PR trigger so this workflow can be smoke-tested before
  # merge. Path-filtered so unrelated PRs don't fire it, and the matrix is
  # reduced via the env block below to ~12 minutes. REMOVE this block before
  # merging — once the harness is validated, only schedule + workflow_dispatch
  # should remain.
  pull_request:
    branches: [main]
    paths:
      - "benchmarks/mlx_grpc_vs_http/**"
      - ".github/workflows/nightly-mlx-bench.yml"

permissions:
  contents: read

concurrency:
  group: nightly-mlx-bench-${{ github.event_name }}-${{ github.ref }}
  # PR pushes: cancel the previous PR run so the newest code runs ASAP.
  # Scheduled / dispatched runs: never cancel each other.
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  bench:
    name: MLX HTTP vs Router+gRPC
    runs-on: macos-latest
    # 4 concurrencies × 2 scenarios × 2 setups × 10 min ≈ 2.7 h, plus build
    # and model download. Cap at 5h45m for safety.
    timeout-minutes: 345
    env:
      MODEL: ${{ github.event.inputs.model || 'mlx-community/gemma-3-4b-it-qat-4bit' }}
      # TEMPORARY: PR runs use the full matrix so we can collect real
      # numbers on this PR before merging. Remove the `pull_request:`
      # trigger entirely (or revert this env block) before merge.
      CONCURRENCIES: ${{ github.event.inputs.concurrencies || '1 4 16 64' }}
      SCENARIOS: ${{ github.event.inputs.scenarios || 'chat agent' }}
      RESULTS_DIR: bench-results
      PYTHONUNBUFFERED: "1"
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install protoc
        run: brew install protobuf

      - name: Cache Cargo registry and target
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: mlx-bench
          cache-on-failure: true

      - name: Build smg (release)
        run: cargo build --release --bin smg

      - name: Build smg-grpc-proto Python package
        run: pip install -e ./crates/grpc_client/python

      - name: Install grpc_servicer with MLX extra
        run: pip install -e "./grpc_servicer[mlx]"

      - name: Install mlx-lm CLI (for the direct-HTTP baseline)
        run: pip install "mlx-lm>=0.22.0"

      - name: Install bench client deps
        # Custom bench client (bench_client.py) replaces genai-bench. We
        # can't use vllm bench because vllm publishes Linux/CUDA wheels
        # only — pip install vllm fails on macos arm64. Custom client is
        # ~250 LOC, mimics vllm bench --save-result output, and supports
        # real datasets (ShareGPT for chat, vdaita/edit_10k_char for the
        # local-agent workload).
        run: pip install "httpx[http2]>=0.27" "datasets>=3.0"

      - name: Verify smg + servicer + bench are runnable
        run: |
          ./target/release/smg --help | head -5
          python3 -c "from smg_grpc_servicer.mlx.server import main; print('servicer OK')"
          python3 -c "import httpx, datasets; print('bench deps OK')"

      - name: Run benchmark — Phase 1 (direct HTTP)
        run: PHASE=http ./benchmarks/mlx_grpc_vs_http/run.sh

      - name: Run benchmark — Phase 2 (SMG router + gRPC)
        # Always run phase 2 even if phase 1 failed — the two are
        # independent and the gRPC numbers are the most interesting half.
        if: always()
        run: PHASE=grpc ./benchmarks/mlx_grpc_vs_http/run.sh

      - name: Aggregate results
        if: always()
        run: |
          python3 benchmarks/mlx_grpc_vs_http/aggregate.py \
            --results-dir "$RESULTS_DIR" \
            --model "$MODEL" \
            --out "$RESULTS_DIR/SUMMARY.md"
          # Mirror to the job summary so it's visible in the run UI without
          # downloading artifacts.
          cat "$RESULTS_DIR/SUMMARY.md" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload raw genai-bench output
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: nightly-mlx-bench-${{ github.run_id }}
          path: bench-results/
          retention-days: 30

      - name: Upload server logs on failure
        if: failure() || cancelled()
        uses: actions/upload-artifact@v7
        with:
          name: nightly-mlx-bench-logs-${{ github.run_id }}
          path: |
            bench-results/mlx-lm.log
            bench-results/mlx-grpc.log
            bench-results/smg-router.log
          retention-days: 14
          if-no-files-found: ignore
