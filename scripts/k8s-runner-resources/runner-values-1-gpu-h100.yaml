## GitHub config URL for the runner scale set
githubConfigUrl: "https://github.com/lightseekorg/smg"

## Name of the Kubernetes secret containing GitHub credentials
## The secret should contain either a PAT (github_token) or GitHub App credentials
githubConfigSecret: github-arc-secret

## Runner scaling configuration
minRunners: 4
maxRunners: 20

## name of the runner scale set to create.  Defaults to the helm release name
runnerScaleSetName: "1-gpu-h100"

resourceMeta: {}
keyVault: {}

## Runner pod template
template:
  spec:
    terminationGracePeriodSeconds: 600

    # Schedule runner pods with Volcano so the binpack plugin consolidates GPU
    # runners onto fewer H100 nodes. The bin-packing weights live in the cluster
    # scheduler config: volcano-system/volcano-scheduler-configmap
    # (see volcano-scheduler-configmap.yaml in this directory).
    schedulerName: volcano

    # hostNetwork puts the runner in the host netns so PD disaggregation KV
    # transfer (NIXL/Mooncake) sees the host's populated RoCE GID tables. An
    # overlay-CNI pod sees the mlx5 NICs as PORT_ACTIVE but with an empty GID
    # table, so RDMA init dies at worker startup. ClusterFirstWithHostNet keeps
    # cluster DNS working while on the host network.
    hostNetwork: true
    dnsPolicy: ClusterFirstWithHostNet

    nodeSelector:
      nvidia.com/gpu: "true"
      node.kubernetes.io/instance-type: BM.GPU.H100.8

    tolerations:
      - key: "nvidia.com/gpu"
        operator: "Equal"
        value: "true"
        effect: "NoSchedule"

    # Pod affinity/anti-affinity intentionally omitted: GPU placement is now
    # driven by the Volcano binpack plugin. NOTE: with hostNetwork, runners
    # co-located by binpack share the host port space — jobs binding fixed host
    # ports can collide when packed onto the same node.

    volumes:
      - name: work
        emptyDir: {}
      - name: model-cache
        hostPath:
          path: /raid/models
          type: Directory
      - name: dshm
        emptyDir:
          medium: Memory
          sizeLimit: 16Gi
      - name: dind-sock
        emptyDir: {}
      - name: dind-externals
        emptyDir: {}
      - name: docker-storage
        emptyDir: {}
      - name: infiniband
        hostPath:
          path: /dev/infiniband
          type: Directory

    containers:
      - name: runner
        image: fra.ocir.io/idqj093njucb/action-runner:v0.0.3
        command:
          - /home/runner/run.sh
        securityContext:
          # Non-root runner (uid 1001) + IPC_LOCK lets RDMA pin completion-queue
          # memory (ibv_create_cq) without granting full privileged.
          privileged: false
          capabilities:
            add:
              - IPC_LOCK
        env:
          - name: DOCKER_HOST
            value: unix:///var/run/docker.sock
          - name: RUNNER_WAIT_FOR_DOCKER_IN_SECONDS
            value: '120'
          - name: HF_HOME
            value: /models
          - name: HF_TOKEN  # required: ci_download_model.sh runs `hf download` for the gated Llama model
            valueFrom:
              secretKeyRef:
                key: HUGGINGFACE_API_KEY
                name: huggingface-secret
          - name: OPENAI_API_KEY
            valueFrom:
              secretKeyRef:
                key: OPENAI_API_KEY
                name: openai-api-key
          - name: ANTHROPIC_API_KEY
            valueFrom:
              secretKeyRef:
                key: ANTHROPIC_API_KEY
                name: anthropic-api-key
          - name: XAI_API_KEY
            valueFrom:
              secretKeyRef:
                key: XAI_API_KEY
                name: xai-api-key
          - name: NODE_IP
            valueFrom:
              fieldRef:
                fieldPath: status.hostIP
        resources:
          requests:
            cpu: '32'
            memory: 128Gi
            rdma/hca_shared_devices_a: '1'
          limits:
            nvidia.com/gpu: 1
            rdma/hca_shared_devices_a: '1'
        volumeMounts:
          - name: model-cache
            mountPath: /models
          - name: dshm
            mountPath: /dev/shm
          - name: work
            mountPath: /home/runner/_work
          - name: dind-sock
            mountPath: /var/run
          - name: docker-storage
            mountPath: /var/lib/docker
          - name: infiniband
            mountPath: /dev/infiniband

    initContainers:
      - name: init-dind-externals
        args:
          - '-r'
          - /home/runner/externals/.
          - /home/runner/tmpDir/
        command:
          - cp
        image: fra.ocir.io/idqj093njucb/action-runner:v0.0.3
        volumeMounts:
          - mountPath: /home/runner/tmpDir
            name: dind-externals
      - name: dind
        args:
          - dockerd
          - '--host=unix:///var/run/docker.sock'
          - '--group=$(DOCKER_GROUP_GID)'
        env:
          - name: DOCKER_GROUP_GID
            value: '123'
          # Suppress dind's default TLS TCP listener (:2376). dockerd only needs
          # the unix socket here; under hostNetwork a TCP listener would bind a
          # node port unnecessarily.
          - name: DOCKER_TLS_CERTDIR
            value: ""
        image: fra.ocir.io/idqj093njucb/docker:dind
        restartPolicy: Always
        securityContext:
          privileged: true
        resources:
          limits:
            cpu: '2'
            memory: 4Gi
          requests:
            cpu: '1'
            memory: 2Gi
        startupProbe:
          exec:
            command:
              - docker
              - info
          failureThreshold: 24
          initialDelaySeconds: 0
          periodSeconds: 5
        volumeMounts:
          - mountPath: /home/runner/_work
            name: work
          - mountPath: /var/run
            name: dind-sock
          - mountPath: /home/runner/externals
            name: dind-externals
          - name: docker-storage
            mountPath: /var/lib/docker
