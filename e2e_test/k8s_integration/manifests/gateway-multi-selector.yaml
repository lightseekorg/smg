apiVersion: apps/v1
kind: Deployment
metadata:
  name: smg-gateway-multi
  namespace: smg-test
spec:
  replicas: 1
  selector:
    matchLabels:
      app: smg-gateway-multi
  template:
    metadata:
      labels:
        app: smg-gateway-multi
    spec:
      serviceAccountName: smg-gateway
      containers:
        - name: gateway
          image: smg-gateway:test
          imagePullPolicy: Never
          args:
            - "--service-discovery"
            # Pool A: "plain-deployment" style engine
            - "--selector-pool"
            - "engine=sglang,role=worker"
            # Pool B: LWS-style engine with a second AND'd label mimicking
            # the LeaderWorkerSet identity marker. A pod must have BOTH
            # labels to match this pool.
            - "--selector-pool"
            - "engine=deepseek-v4,leaderworkerset.sigs.k8s.io/name=deepseek-v4"
            - "--service-discovery-port"
            - "8000"
            - "--service-discovery-namespace"
            - "smg-test"
            - "--port"
            - "30002"
            - "--prometheus-port"
            - "29002"
            - "--disable-health-check"
            - "--worker-startup-timeout-secs"
            - "30"
            - "--log-level"
            - "debug"
          ports:
            - containerPort: 30002
              name: http
            - containerPort: 29002
              name: metrics
          readinessProbe:
            httpGet:
              path: /liveness
              port: 30002
            initialDelaySeconds: 3
            periodSeconds: 3
          livenessProbe:
            httpGet:
              path: /liveness
              port: 30002
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: smg-gateway-multi
  namespace: smg-test
spec:
  type: NodePort
  selector:
    app: smg-gateway-multi
  ports:
    - name: http
      port: 30002
      targetPort: 30002
    - name: metrics
      port: 29002
      targetPort: 29002
