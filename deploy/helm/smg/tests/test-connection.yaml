apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "smg.fullname" . }}-test-connection"
  labels:
    {{- include "smg.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
spec:
  containers:
    - name: curl
      image: curlimages/curl:latest
      command:
        - curl
        - -sf
        - http://{{ include "smg.fullname" . }}-router:{{ .Values.router.service.port }}/health
  restartPolicy: Never
