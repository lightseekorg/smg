# Router with TensorRT-LLM workers (user-provided image required).
# Usage: helm install smg deploy/helm/smg -f examples/router-worker-trtllm.yaml
mode: router-worker
router:
  policy: round_robin
worker:
  replicas: 2
  backend: trtllm
  model: meta-llama/Llama-3-70b
  image:
    repository: my-registry.example.com/trtllm-engine
    tag: "latest"
  resources:
    limits:
      nvidia.com/gpu: 4
    requests:
      cpu: "16"
      memory: 128Gi
