apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "smg.fullname" . }}-test-connection"
  labels:
    {{- include "smg.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
spec:
  containers:
    - name: curl
      image: curlimages/curl:8.12.1
      command:
        - curl
        - -sf
        - --retry
        - "10"
        - --retry-connrefused
        - --retry-delay
        - "3"
        - --retry-max-time
        - "60"
        - http://{{ include "smg.fullname" . }}-router:{{ .Values.router.service.port }}/health
  restartPolicy: Never
