syntax = "proto3";

package mesh.gossip;

service Gossip {
  rpc PingServer(GossipMessage) returns (NodeUpdate);
  // Bidirectional streaming for state synchronization
  rpc SyncStream(stream StreamMessage) returns (stream StreamMessage);
}

enum NodeStatus {
  INIT = 0;
  ALIVE = 1;
  SUSPECTED = 2;
  DOWN = 3;
  LEAVING = 4;
}

message NodeState {
  string name = 1;
  string address = 2;
  NodeStatus status = 3;
  uint64 version = 4;
  map<string, bytes> metadata = 5;
}


message StateSync {
  repeated NodeState nodes = 1;
}

message Ping {
  StateSync state_sync = 1;
}

message PingReq {
  NodeState node = 1;
}

message Ack {
  uint64 timestamp = 1;
}

message NodeUpdate {
  string name = 1;
  string address = 2;
  NodeStatus status = 3;
}

message GossipMessage {
  oneof payload {
    Ping ping = 1;
    PingReq ping_req = 2;
  }
}

// Stream message types for bidirectional streaming
enum StreamMessageType {
  HEARTBEAT = 0;
  STREAM_BATCH = 1;
  CRDT_BATCH = 2;
  ACK = 3;
  NACK = 4;
}

message StreamMessage {
  StreamMessageType message_type = 1;
  oneof payload {
    StreamAck ack = 5;
    StreamBatch stream_batch = 8;
    CrdtBatch crdt_batch = 9;
  }
  uint64 sequence = 6; // Sequence number for ordering
  string peer_id = 7;   // Sender peer ID
}

message StreamAck {
  uint64 sequence = 1;
  bool success = 2;
  string error_message = 3;
}

// One stream value for a single key. Values that fit in a single gRPC
// message use total_chunks = 1 and chunk_index = 0. Values exceeding
// max_message_size are split into N chunks with chunk_index in
// [0, total_chunks). The receiver reassembles via ChunkAssembler.
// Tree repair pages MUST stay bounded and always use total_chunks = 1.
message StreamEntry {
  string key = 1;
  uint64 generation = 2;
  uint32 chunk_index = 3;
  uint32 total_chunks = 4;
  bytes data = 5;
}

// One or more stream entries delivered in a single gossip round.
message StreamBatch {
  repeated StreamEntry entries = 1;
}

message CrdtBatch {
  repeated CrdtBatchEntry entries = 1;
}

message CrdtBatchEntry {
  string key = 1;
  bytes value = 2;
  bool tombstone = 3;
  uint64 timestamp = 4;
  string replica_id = 5;
}
