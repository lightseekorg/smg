apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "helm.fullname" . }}
  labels:
    {{- include "helm.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "helm.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "helm.labels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "helm.serviceAccountName" . }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds }}
      containers:
        - name: {{ .Chart.Name }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{ with .Values.args }}
          args:
            {{- toYaml . | nindent 12 }}
          {{ end }}
          env:
            {{- range $key, $value := .Values.applicationEnv }}
            - name: {{ $key | quote }}
              value: {{ $value | toString | quote }}
            {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
            - name: metrics
              containerPort: {{ .Values.metrics.port }}
              protocol: TCP
          {{- with .Values.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- $csiMounts := default (list) .Values.csiSecretsStore.mounts }}
          {{- $csiEnabled := and .Values.csiSecretsStore.enabled (gt (len $csiMounts) 0) }}
          {{- if or (gt (len (default (list) .Values.volumeMounts)) 0) $csiEnabled }}
          volumeMounts:
            {{- if gt (len (default (list) .Values.volumeMounts)) 0 }}
            {{- toYaml .Values.volumeMounts | nindent 12 }}
            {{- end }}
            {{- if $csiEnabled }}
            {{- range $mount := $csiMounts }}
            - name: {{ $mount.name }}
              mountPath: {{ $mount.mountPath | quote }}
              {{- if hasKey $mount "readOnly" }}
              readOnly: {{ $mount.readOnly }}
              {{- else }}
              readOnly: true
              {{- end }}
            {{- end }}
            {{- end }}
          {{- end }}
      {{- if or (gt (len (default (list) .Values.volumes)) 0) $csiEnabled }}
      volumes:
        {{- if gt (len (default (list) .Values.volumes)) 0 }}
        {{- toYaml .Values.volumes | nindent 8 }}
        {{- end }}
        {{- if $csiEnabled }}
        {{- range $mount := $csiMounts }}
        - name: {{ $mount.name }}
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: {{ default (printf "%s-%s-oci-vault" (include "helm.fullname" $) $mount.name) $mount.secretProviderClassName | quote }}
        {{- end }}
        {{- end }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
