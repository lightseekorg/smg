{{- if and .Values.csiSecretsStore.enabled (gt (len (default (list) .Values.csiSecretsStore.mounts)) 0) }}
{{- range $mount := .Values.csiSecretsStore.mounts }}
{{- $spcName := default (printf "%s-%s-oci-vault" (include "helm.fullname" $) $mount.name) $mount.secretProviderClassName }}
{{- $secrets := list }}
{{- range $secret := $mount.secrets }}
{{- $entry := dict "name" $secret.name }}
{{- if $secret.versionNumber }}{{- $_ := set $entry "versionNumber" $secret.versionNumber }}{{- end }}
{{- if $secret.stage }}{{- $_ := set $entry "stage" $secret.stage }}{{- end }}
{{- if $secret.fileName }}{{- $_ := set $entry "fileName" $secret.fileName }}{{- end }}
{{- $secrets = append $secrets $entry }}
{{- end }}
---
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: {{ $spcName }}
  namespace: {{ $.Release.Namespace }}
spec:
  provider: oci
  parameters:
    region: {{ $mount.region | quote }}
    vaultId: {{ $mount.vaultId | quote }}
    secrets: {{ toJson $secrets | quote }}
    authType: instance
{{- end }}
{{- end }}
